# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  nginx:
    volumes: !override
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports: !override
      - "80:80"
      - "443:443"

  nextjs:
    image: !reset null
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    command: !reset null
    working_dir: !reset null
    ports: !reset []
    expose:
      - "3000"
    volumes: !reset []

  api:
    image: !reset null
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    command: !reset null
    working_dir: !reset null
    ports: !reset []
    expose:
      - "4000"
    volumes: !override
      - /proc:/host/proc:ro

  workers:
    image: !reset null
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    command: !reset null
    working_dir: !reset null
    volumes: !reset []

  redis:
    ports: !reset []
    expose:
      - "6379"

  postgres:
    ports: !reset []
    expose:
      - "5432"

  minio:
    ports: !reset []
    expose:
      - "9000"
