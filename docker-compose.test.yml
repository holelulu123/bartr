# Test-only services for integration tests (13.8, 13.9)
# Usage: docker compose -f docker-compose.test.yml up -d
#        pnpm --filter @bartr/api run test

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bartr
      POSTGRES_PASSWORD: bartr_dev_password
      POSTGRES_DB: bartr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bartr -d bartr"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: bartr
      MINIO_ROOT_PASSWORD: bartr_dev_password
