services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs
      - api

  nextjs:
    image: node:20-alpine
    working_dir: /app/packages/web
    command: sh -c "npx --yes next dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - api

  api:
    image: node:20-alpine
    working_dir: /app/packages/api
    command: sh -c "npx --yes tsx watch src/index.ts"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /proc:/host/proc:ro
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  workers:
    image: node:20-alpine
    working_dir: /app/packages/workers
    command: sh -c "npx --yes tsx watch src/index.ts"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data

volumes:
  pgdata:
  minio-data:
